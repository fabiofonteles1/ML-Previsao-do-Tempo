site_name: Previsão Climática no DF
site_description: Documentação do projeto de Machine Learning aplicado ao agronegócio do Distrito Federal
site_author: Grupo 06
repo_url: https://github.com/SEU-USUARIO/SEU-REPOSITORIO
repo_name: SEU-USUARIO/SEU-REPOSITORIO

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate
  palette:
    - scheme: default
      primary: green
      accent: teal
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - scheme: slate
      primary: green
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

nav:
  - Início: index.md
  - Projeto: projeto.md
  - Fontes de Dados: dados.md
  - Metodologia: metodologia.md
  - Ética e Conformidade: etica.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
